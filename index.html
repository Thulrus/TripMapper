<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripMapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="map"></div>

  <aside id="sidebar" aria-label="Waypoints">
    <div id="sidebar-header">
      <h2>Waypoints</h2>
      <button id="clear-all-btn" aria-label="Remove all waypoints">Clear all</button>
    </div>
    <div id="waypoint-list" role="list"></div>
    <div id="route-stats" class="hidden" aria-live="polite">
      <div class="stat-row">
        <span class="stat-label">Distance</span>
        <span id="stat-distance" class="stat-value">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Drive time</span>
        <span id="stat-duration" class="stat-value">—</span>
      </div>
    </div>
  </aside>

  <div id="search-container">
    <div id="search-box">
      <input
        type="text"
        id="search-input"
        placeholder="Search a place…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search for a place"
      />
      <button id="search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
    <p id="search-error" class="hidden" role="alert">Place not found.</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
